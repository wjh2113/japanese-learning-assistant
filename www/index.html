<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <title>日语学习助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .fade-in { animation: fadeIn 0.25s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .tab-active { color: #0ea5e9; }
    .tab-active .tab-icon { background-color: #e0f2fe; }
    .ruby-text ruby { ruby-align: center; }
    /* Mobile bottom nav */
    .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    .main-content { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    /* Hide web top nav on native */
    body.is-native .web-nav { display: none; }
    body:not(.is-native) .native-nav { display: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto px-4 py-6 main-content">
    <!-- Header -->
    <header class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-xl md:text-2xl font-bold text-slate-900">🇯🇵 日语学习助手</h1>
        <p class="text-xs md:text-sm text-slate-500">AI 驱动的听说读写练习</p>
      </div>
      <div class="flex items-center gap-2 md:gap-3">
        <span id="levelBadge" class="px-3 py-1 rounded-full text-xs font-semibold bg-sky-100 text-sky-700">N5</span>
        <button id="settingsBtn" class="px-3 py-1.5 text-sm rounded-lg border border-slate-300 hover:bg-slate-100 transition active:bg-slate-200">⚙️ 设置</button>
      </div>
    </header>

    <!-- Web Navigation (top tabs) -->
    <nav class="web-nav flex border-b border-slate-200 mb-6 bg-white rounded-t-lg px-2">
      <button data-tab="listening" class="tab-btn flex-1 py-3 text-sm font-medium text-slate-600 hover:text-sky-600 transition tab-active">🎧 听力</button>
      <button data-tab="speaking" class="tab-btn flex-1 py-3 text-sm font-medium text-slate-600 hover:text-sky-600 transition">🎤 口语</button>
      <button data-tab="reading"  class="tab-btn flex-1 py-3 text-sm font-medium text-slate-600 hover:text-sky-600 transition">📖 阅读</button>
      <button data-tab="writing"  class="tab-btn flex-1 py-3 text-sm font-medium text-slate-600 hover:text-sky-600 transition">✍️ 写作</button>
    </nav>

    <!-- Module container -->
    <main id="moduleContainer" class="bg-white rounded-lg md:rounded-b-lg shadow-sm border border-slate-200 p-4 md:p-6 min-h-[420px]">
      <div id="moduleContent" class="fade-in"></div>
    </main>

    <!-- Footer -->
    <footer class="mt-8 text-center text-xs text-slate-400 pb-4">
      日语学习助手 · 数据保存在本地 · AI 内容由第三方模型生成
    </footer>
  </div>

  <!-- Native Bottom Navigation -->
  <nav class="native-nav fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-30 bottom-nav safe-area-bottom">
    <div class="flex justify-around items-center h-16">
      <button data-tab="listening" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 py-2 text-xs font-medium text-slate-600 transition tab-active">
        <span class="tab-icon w-9 h-9 flex items-center justify-center rounded-full">🎧</span>
        <span>听力</span>
      </button>
      <button data-tab="speaking" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 py-2 text-xs font-medium text-slate-600 transition">
        <span class="tab-icon w-9 h-9 flex items-center justify-center rounded-full">🎤</span>
        <span>口语</span>
      </button>
      <button data-tab="reading" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 py-2 text-xs font-medium text-slate-600 transition">
        <span class="tab-icon w-9 h-9 flex items-center justify-center rounded-full">📖</span>
        <span>阅读</span>
      </button>
      <button data-tab="writing" class="tab-btn flex-1 flex flex-col items-center justify-center gap-1 py-2 text-xs font-medium text-slate-600 transition">
        <span class="tab-icon w-9 h-9 flex items-center justify-center rounded-full">✍️</span>
        <span>写作</span>
      </button>
    </div>
  </nav>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-auto p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center text-white font-bold text-xs">DS</div>
          <h2 class="text-lg font-bold">DeepSeek 模型配置</h2>
        </div>
        <button id="closeSettings" class="text-slate-400 hover:text-slate-600 w-8 h-8 flex items-center justify-center">✕</button>
      </div>

      <div class="p-3 bg-sky-50 rounded-lg mb-4 text-sm text-sky-800">
        <p class="font-medium">🚀 默认使用 DeepSeek V4 Pro</p>
        <p class="text-xs mt-1 text-sky-600">在 <a href="https://platform.deepseek.com/" target="_blank" class="underline">platform.deepseek.com</a> 获取 API Key</p>
      </div>

      <form id="settingsForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">API Base URL</label>
          <input type="text" id="apiBase" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="https://api.deepseek.com/v1" value="https://api.deepseek.com/v1" />
          <p class="text-xs text-slate-500 mt-1">DeepSeek 官方 API 地址，一般无需修改</p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">DeepSeek API Key</label>
          <input type="password" id="apiKey" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="sk-..." />
          <p class="text-xs text-slate-500 mt-1">你的 API Key 仅保存在本地浏览器</p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">默认模型</label>
          <select id="apiModel" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
            <option value="deepseek-v4-pro" selected>deepseek-v4-pro（推荐）</option>
            <option value="deepseek-v4">deepseek-v4</option>
            <option value="deepseek-chat">deepseek-chat</option>
            <option value="deepseek-reasoner">deepseek-reasoner</option>
            <option value="custom">自定义（请在下方输入）</option>
          </select>
          <input type="text" id="customApiModel" class="hidden w-full mt-2 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" placeholder="输入自定义模型名称" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">默认等级</label>
          <select id="defaultLevel" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500">
            <option value="N5">N5（入门）</option>
            <option value="N4">N4（初级）</option>
            <option value="N3">N3（中级）</option>
            <option value="N2">N2（中高级）</option>
            <option value="N1">N1（高级）</option>
          </select>
        </div>
        <div class="pt-2 flex flex-col gap-3">
          <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-indigo-600 text-white py-2.5 rounded-lg hover:opacity-90 transition active:opacity-80">保存配置</button>
          <button type="button" id="testConnection" class="w-full border border-slate-300 py-2.5 rounded-lg hover:bg-slate-100 transition active:bg-slate-200">测试 DeepSeek 连接</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="fixed inset-0 bg-white/60 hidden items-center justify-center z-40">
    <div class="flex flex-col items-center">
      <div class="w-10 h-10 border-4 border-sky-200 border-t-sky-600 rounded-full animate-spin"></div>
      <p class="mt-3 text-sm text-slate-600">AI 思考中…</p>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script type="module">
    try {
      if (typeof window !== 'undefined' && window.Capacitor?.isNativePlatform?.()) {
        document.body.classList.add('is-native');
      }
    } catch {
      // Web build does not have Capacitor, ignore
    }
  </script>
  <script>
    window.addEventListener('error', (e) => {
      const msg = e.error?.message || e.message || 'Unknown error';
      console.error('Global error:', e.error || e);
      const box = document.createElement('div');
      box.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;background:#fee2e2;color:#991b1b;padding:12px;border-radius:8px;z-index:9999;font-size:14px;';
      box.innerHTML = '<strong>JS Error:</strong> ' + msg;
      document.body.appendChild(box);
    });
  </script>
</body>
</html>
